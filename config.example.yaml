# Hermes OMC Workflow — Example Config
#
# Prefer config/omc.yaml (loaded by default, or via OMC_CONFIG).
# This file is a short reference of the schema.

omc:
  adapter: discord
  agents_dir: agents

channels:
  pm: "1528310140564934708"
  sa: "1528310312317751376"
  coder: "1528310344164835389"
  qa: "1528310424536354866"
  devops: "REPLACE_WITH_DEVOPS_CHANNEL_ID"
  marketing: "1528310499773648968"

routes:
  "#pm": ["#sa", "#devops", "#marketing"]
  "#sa": ["#pm", "#coder", "#qa"]
  "#coder": ["#sa", "#qa", "#devops"]
  "#qa": ["#sa", "#coder", "#devops"]
  "#devops": ["#pm", "#coder", "#qa"]
  "#marketing": ["#pm"]

tickets:
  provider: none   # plane | jira | none
  store_path: "~/.hermes/omc/task_map.json"
