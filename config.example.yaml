# Hermes OMC Workflow — Example Config (topic mode)
# Copy to config/omc.yaml and set real channel IDs + OMC_WORKSPACE.

omc:
  adapter: discord
  agents_dir: agents

topics:
  product:
    channel_id: "REPLACE_PRODUCT_CHANNEL_ID"
    agents: [pm, sa]
    ticket_create_roles: [pm, sa]
  engineering:
    channel_id: "REPLACE_ENGINEERING_CHANNEL_ID"
    agents: [pm, sa, coder, qa, devops, hermes, claude, cursor, opencode]
    ticket_create_roles: [pm, sa]
  marketing:
    channel_id: "REPLACE_MARKETING_CHANNEL_ID"
    agents: [pm, marketing]
    ticket_create_roles: [pm]
  support:
    channel_id: "REPLACE_SUPPORT_CHANNEL_ID"
    agents: [pm, sa, coder, qa, hermes, claude, cursor, opencode]
    ticket_create_roles: [pm, sa]
  standup:
    channel_id: "REPLACE_STANDUP_CHANNEL_ID"
    agents: [standup]
    ticket_create_roles: []

agent_routes:
  pm: [sa, devops, marketing, coder]
  sa: [pm, coder, qa]
  coder: [sa, qa, devops]
  qa: [sa, coder, devops]
  devops: [pm, coder, qa]
  marketing: [pm]
  standup: []

coding:
  default: hermes
  workspace: "${OMC_WORKSPACE}"
  aliases:
    coder: null
    hermes: hermes
    claude: claude
    cursor: cursor
    opencode: opencode

tickets:
  provider: none
  store_path: "~/.hermes/omc/task_map.json"
